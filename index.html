<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
    <style>
        :root {
            --bg: #0f172a; --nav: rgba(15, 23, 42, 0.95); --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc; --dim: #94a3b8; --accent: #3b82f6; --green: #10b981;
            --orange: #f59e0b; --red: #ef4444; --border: rgba(255, 255, 255, 0.1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; transition: 0.3s; }
        
        /* --- Universal Navigation --- */
        .top-nav {
            width: 100%; background: var(--nav); border-bottom: 1px solid var(--border);
            padding: 12px 0; display: flex; justify-content: center; gap: 25px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .top-nav span { color: var(--dim); font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .top-nav span:hover { color: var(--accent); }

        /* --- View Management --- */
        .view { display: none; width: 100%; min-height: calc(100vh - 50px); flex-direction: column; align-items: center; padding: 40px 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* --- Calculator UI --- */
        .calc-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .screen { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; text-align: right; margin-bottom: 20px; border: 1px solid var(--border); }
        #res-field { font-size: 32px; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; cursor: pointer; }
        .btn:hover { background: var(--accent); }
        .btn-sci { font-size: 11px; color: var(--green); }

        /* --- Grapher UI --- */
        .graph-workspace { display: grid; grid-template-columns: 300px 1fr; gap: 20px; width: 100%; max-width: 1200px; height: 600px; }
        .graph-controls { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        canvas { background: #000; border-radius: 20px; border: 1px solid var(--border); width: 100%; height: 100%; }

        /* --- Arcade UI --- */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; }
        .game-card { background: var(--card); border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
        .game-card:hover { transform: scale(1.05); border-color: var(--green); }
        .game-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .game-card p { padding: 10px; margin: 0; text-align: center; font-size: 13px; }

        /* --- Player Overlay --- */
        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        #player iframe { flex-grow: 1; border: none; }

        /* --- Cheat Sheet UI --- */
        .sheet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; }
        .formula-box { background: var(--card); padding: 20px; border-radius: 15px; border-left: 4px solid var(--accent); }
        code { color: var(--green); font-family: monospace; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <span onclick="changeView('calculator')">Calculator</span>
        <span onclick="changeView('algebra')">Algebra</span>
        <span onclick="changeView('geometry')">Geometry</span>
        <span onclick="changeView('grapher')">Graphing Calc</span>
    </nav>

    <div id="view-calculator" class="view active">
        <div class="calc-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:10px; color:var(--dim)">
                <span>PRECISION ENGINE v5.0</span>
                <input type="checkbox" id="secret-trigger">
            </div>
            <div class="screen">
                <div id="exp-field" style="height:20px; font-size:12px; color:var(--dim)"></div>
                <div id="res-field">0</div>
            </div>
            <div class="grid">
                <button class="btn btn-sci" onclick="sci('sin')">sin</button>
                <button class="btn btn-sci" onclick="sci('cos')">cos</button>
                <button class="btn btn-sci" onclick="sci('tan')">tan</button>
                <button class="btn btn-sci" onclick="sci('sqrt')">√</button>
                <button class="btn" style="color:var(--red)" onclick="clr()">AC</button>
                <button class="btn" onclick="press('/')">÷</button>
                <button class="btn" onclick="press('*')">×</button>
                <button class="btn" onclick="press('-')">−</button>
                <button class="btn" onclick="press('7')">7</button>
                <button class="btn" onclick="press('8')">8</button>
                <button class="btn" onclick="press('9')">9</button>
                <button class="btn" onclick="press('+')">+</button>
                <button class="btn" style="grid-column: span 2" onclick="press('0')">0</button>
                <button class="btn" onclick="press('.')">.</button>
                <button class="btn" style="background:var(--orange)" onclick="solve()">=</button>
            </div>
        </div>
    </div>

    <div id="view-algebra" class="view">
        <div class="sheet-grid">
            <div class="formula-box"><h4>Quadratic Formula</h4><code>x = [-b ± √(b²-4ac)] / 2a</code></div>
            <div class="formula-box"><h4>Log Rules</h4><code>log(xy) = log x + log y</code></div>
            <div class="formula-box"><h4>Binomial</h4><code>(a+b)² = a² + 2ab + b²</code></div>
        </div>
    </div>

    <div id="view-geometry" class="view">
        <div class="sheet-grid">
            <div class="formula-box" style="border-left-color:var(--green)"><h4>Circle</h4><code>Area = πr²</code></div>
            <div class="formula-box" style="border-left-color:var(--green)"><h4>Pythagorean</h4><code>a² + b² = c²</code></div>
            <div class="formula-box" style="border-left-color:var(--green)"><h4>Sphere</h4><code>V = 4/3πr³</code></div>
        </div>
        
    </div>

    <div id="view-grapher" class="view">
        <div class="graph-workspace">
            <div class="graph-controls">
                <h3 style="color:var(--accent)">Functions</h3>
                <input type="text" id="eq-input" style="width:100%; background:#000; border:1px solid var(--border); color:var(--green); padding:10px; border-radius:8px;" value="Math.sin(x)">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="drawGraph()">Plot</button>
            </div>
            <canvas id="graphCanvas"></canvas>
        </div>
        
    </div>

    <div id="view-games" class="view">
        <div class="game-grid" id="game-grid"></div>
    </div>

    <div id="player">
        <div style="background:#1e293b; padding:10px; display:flex; gap:20px;">
            <button class="btn" style="padding:5px 15px;" onclick="closePlayer()">Exit</button>
            <span id="playing-title" style="align-self:center">Loading Resource...</span>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        const GAMES = [
            {"name": "1v1.LOL", "url": "https://geet.in.net/get/1v1-lol/game.html", "img": "https://geet.in.net/get/1v1-lol/splash.png"},
            {"name": "Slope", "url": "https://geet.in.net/get/slope/game.html", "img": "https://geet.in.net/get/slope/slope4.jpeg"},
            {"name": "Retro Bowl", "url": "https://geet.in.net/get/retro-bowl/game.html", "img": "https://geet.in.net/get/retro-bowl/img/icon.jpg"},
            {"name": "Minecraft", "url": "https://geet.in.net/get/minecraft-15/game.html", "img": "https://geet.in.net/get/minecraft-15/splash.jpeg"}
        ];

        let exp = "";
        function press(v) { exp += v; document.getElementById('res-field').textContent = exp; }
        function clr() { exp = ""; document.getElementById('res-field').textContent = "0"; }
        function solve() {
            if (document.getElementById('secret-trigger').checked && exp === "8290") { changeView('games'); clr(); return; }
            try { exp = eval(exp).toString(); document.getElementById('res-field').textContent = exp; } 
            catch { document.getElementById('res-field').textContent = "Error"; }
        }
        function sci(type) {
            let v = parseFloat(exp) || 0;
            if (type === 'sin') exp = Math.sin(v * Math.PI / 180).toFixed(4);
            if (type === 'sqrt') exp = Math.sqrt(v).toFixed(4);
            document.getElementById('res-field').textContent = exp;
        }

        function changeView(v) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if (v === 'grapher') setTimeout(drawGraph, 100);
            if (v === 'games') renderGames();
        }

        function drawGraph() {
            const c = document.getElementById('graphCanvas'); const ctx = c.getContext('2d');
            c.width = c.clientWidth; c.height = c.clientHeight;
            ctx.strokeStyle = '#334155'; ctx.beginPath();
            for(let i=0; i<c.width; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,c.height); }
            for(let i=0; i<c.height; i+=40) { ctx.moveTo(0,i); ctx.lineTo(c.width,i); }
            ctx.stroke();
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.beginPath();
            for(let screenX=0; screenX<c.width; screenX++) {
                let x = (screenX - c.width/2)/40;
                let y = eval(document.getElementById('eq-input').value);
                let screenY = c.height/2 - (y * 40);
                if(screenX===0) ctx.moveTo(screenX, screenY); else ctx.lineTo(screenX, screenY);
            }
            ctx.stroke();
        }

        function renderGames() {
            const grid = document.getElementById('game-grid'); grid.innerHTML = "";
            GAMES.forEach(g => {
                const div = document.createElement('div'); div.className = 'game-card';
                div.innerHTML = `<img src="${g.img}"><p>${g.name}</p>`;
                div.onclick = () => { document.getElementById('game-frame').src = g.url; document.getElementById('player').style.display='flex'; };
                grid.appendChild(div);
            });
        }

        function closePlayer() { document.getElementById('player').style.display='none'; document.getElementById('game-frame').src=''; }
        document.addEventListener('keydown', e => { if(e.key === 'Escape' || e.key === '`') { closePlayer(); changeView('calculator'); }});
    </script>
</body>
</html>
