<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0nlineCalculator</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="https://www.google.com/s2/favicons?domain=calculator.com">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Views --- */
        .view { display: none; width: 100%; min-height: 100vh; }
        .view-active { display: flex; flex-direction: column; align-items: center; }

        /* --- Nav Bar --- */
        .top-nav {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .top-nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 500; transition: 0.3s; }
        .top-nav a:hover { color: var(--accent-green); }

        /* --- Calculator --- */
        .calc-card {
            margin-top: 50px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            width: 340px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .calc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calc-header span { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .screen {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            border: 1px solid var(--glass-border);
        }
        #calc-expression { font-size: 14px; color: var(--text-dim); height: 18px; margin-bottom: 5px; }
        #calc-result { font-size: 32px; font-weight: 600; }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 0;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .btn-op { color: var(--accent-orange); }
        .btn-eq { background: var(--accent-orange); border: none; }
        .btn-red { color: var(--accent-red); }

        /* --- Arcade Grid --- */
        #view-games { padding: 40px; box-sizing: border-box; }
        .arcade-tools { width: 100%; max-width: 1000px; display: flex; gap: 20px; margin-bottom: 30px; }
        .search-in { flex-grow: 1; background: #1e293b; border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 10px; color: white; outline: none; }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .game-card {
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--glass-border);
            text-align: center;
        }
        .game-card:hover { transform: scale(1.05); border-color: var(--accent-green); }
        .game-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .game-card div { padding: 10px; font-size: 12px; font-weight: 600; }

        /* --- Player View --- */
        #view-play { background: #000; flex-direction: column; }
        .play-nav { width: 100%; height: 50px; background: #1e293b; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        #game-iframe { flex-grow: 1; width: 100%; border: none; }
    </style>
</head>
<body>

    <div id="view-calculator" class="view view-active">
        <nav class="top-nav">
            <a href="#">Algebra</a><a href="#">Geometry</a><a href="#">Graphs</a><a href="#">Finance</a>
        </nav>
        <div class="calc-card">
            <div class="calc-header">
                <span>Core Engine v4.2</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="screen">
                <div id="calc-expression"></div>
                <div id="calc-result">0</div>
            </div>
            <div class="btn-grid">
                <button class="btn btn-red" onclick="handleAction('clear')">AC</button>
                <button class="btn btn-op" onclick="handleAction('divide')">÷</button>
                <button class="btn btn-op" onclick="handleAction('multiply')">×</button>
                <button class="btn btn-op" onclick="handleAction('subtract')">−</button>
                
                <button class="btn" onclick="onDigitPress('7')">7</button>
                <button class="btn" onclick="onDigitPress('8')">8</button>
                <button class="btn" onclick="onDigitPress('9')">9</button>
                <button class="btn btn-op" onclick="handleAction('add')">+</button>
                
                <button class="btn" onclick="onDigitPress('4')">4</button>
                <button class="btn" onclick="onDigitPress('5')">5</button>
                <button class="btn" onclick="onDigitPress('6')">6</button>
                <button class="btn btn-eq" style="grid-row: span 2" onclick="handleAction('equals')">=</button>
                
                <button class="btn" onclick="onDigitPress('1')">1</button>
                <button class="btn" onclick="onDigitPress('2')">2</button>
                <button class="btn" onclick="onDigitPress('3')">3</button>
                
                <button class="btn" style="grid-column: span 2" onclick="onDigitPress('0')">0</button>
                <button class="btn" onclick="onDigitPress('.')">.</button>
            </div>
        </div>
    </div>

    <div id="view-games" class="view">
        <div class="arcade-tools">
            <input type="text" id="search-input" class="search-in" placeholder="Search resources...">
            <button class="btn btn-red" style="padding: 0 20px;" onclick="switchView('calculator')">Lock</button>
        </div>
        <div id="games-grid" class="games-grid"></div>
    </div>

    <div id="view-play" class="view">
        <div class="play-nav">
            <button class="btn" style="padding: 5px 15px; font-size: 12px;" onclick="switchView('games')">← Back</button>
            <span id="playing-title" style="font-size: 14px; color: var(--text-dim);">Resource Loading...</span>
        </div>
        <iframe id="game-iframe" src="about:blank"></iframe>
    </div>

    <script>
        const GAMES_DATA = [
            {"code": "1001", "name": "1v1.LOL", "iframe": "https://geet.in.net/get/1v1-lol/game.html", "thumb": "https://geet.in.net/get/1v1-lol/splash.png"},
            {"code": "1002", "name": "Retro Bowl", "iframe": "https://geet.in.net/get/retro-bowl/game.html", "thumb": "https://geet.in.net/get/retro-bowl/img/icon.jpg"},
            {"code": "1003", "name": "Subway Surfers", "iframe": "https://geet.in.net/get/subway-surfers/game.html", "thumb": "https://geet.in.net/get/subway-surfers-ny/NewYorkIcon.png"},
            {"code": "1004", "name": "Drive Mad", "iframe": "https://geet.in.net/get/drive-mad/game.html", "thumb": "https://geet.in.net/get/drive-mad/logo.jpg"}
        ];

        const CLOAK = {
            google: { title: 'Google', icon: 'https://www.google.com/favicon.ico' },
            calc: { title: '0nlineCalculator', icon: 'https://www.google.com/s2/favicons?domain=calculator.com' }
        };

        let expression = '';
        let codeInput = '';
        const exprEl = document.getElementById('calc-expression');
        const resEl = document.getElementById('calc-result');

        function applyCloak(type) {
            document.title = CLOAK[type].title;
            document.getElementById('favicon').href = CLOAK[type].icon;
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.getElementById('view-' + view).classList.add('view-active');
            
            if (view === 'calculator') {
                applyCloak('calc');
                document.getElementById('game-iframe').src = 'about:blank';
            } else {
                applyCloak('google');
                if(view === 'games') renderGrid();
            }
        }

        function onDigitPress(digit) {
            const isSecret = document.getElementById('mode-toggle').checked;
            if (isSecret) {
                codeInput += digit;
                resEl.textContent = codeInput;
                if (codeInput === '8290') {
                    switchView('games');
                    codeInput = '';
                    resEl.textContent = '0';
                } else if (codeInput.length >= 4) {
                    codeInput = '';
                    resEl.textContent = '0';
                }
                return;
            }
            expression += digit;
            resEl.textContent = expression;
        }

        function handleAction(action) {
            if (action === 'clear') { expression = ''; resEl.textContent = '0'; exprEl.textContent = ''; }
            if (action === 'equals') {
                try {
                    exprEl.textContent = expression + ' =';
                    expression = eval(expression.replace('×', '*').replace('÷', '/')).toString();
                    resEl.textContent = expression;
                } catch { resEl.textContent = 'Error'; expression = ''; }
            }
            if (['add','subtract','multiply','divide'].includes(action)) {
                const char = action === 'multiply' ? '×' : action === 'divide' ? '÷' : action === 'add' ? '+' : '-';
                expression += char;
                resEl.textContent = expression;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '';
            GAMES_DATA.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<img src="${g.thumb}"><div>${g.name}</div>`;
                card.onclick = () => {
                    document.getElementById('game-iframe').src = g.iframe;
                    document.getElementById('playing-title').textContent = g.name;
                    switchView('play');
                };
                grid.appendChild(card);
            });
        }

        // Panic Key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.key === '`') {
                switchView('calculator');
            }
        });

        // Search
        document.getElementById('search-input').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        };
    </script>
</body>
</html>
