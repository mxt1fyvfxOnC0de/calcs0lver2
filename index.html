<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S0lveCalc02</title>
    <style>
        :root {
            --bg-color: #2c343f;
            --calc-bg: #343d4a;
            --display-bg: #cbd5c0;
            --btn-gray: #434c5e;
            --btn-orange: #e67e22;
            --btn-red: #e74c3c;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --arcade-bg: #1a1c23;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #d1d9e6; /* Light outer bg like screenshot 2 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Calculator Styling (Matches Screenshot 2) --- */
        #calc-container {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #999; }
        input:checked + .slider:before { transform: translateX(24px); }

        .display-screen {
            background-color: var(--display-bg);
            height: 100px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 15px;
            box-sizing: border-box;
            color: var(--text-dark);
            font-size: 3rem;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .sci-row {
            grid-column: span 4;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 15px 5px;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            background-color: var(--btn-gray);
            transition: brightness 0.2s;
        }

        .btn:hover { filter: brightness(1.2); }
        .btn-sci { font-size: 0.85rem; padding: 10px 0; }
        .btn-orange { background-color: var(--btn-orange); }
        .btn-red { background-color: var(--btn-red); }
        .btn-wide { grid-column: span 2; }

        /* --- Arcade Styling (Matches Screenshot 1) --- */
        #arcade-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--arcade-bg);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .arcade-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px;
        }

        .search-bar {
            background: #252833;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            width: 300px;
            outline: none;
        }

        .exit-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-item {
            background: #1e212b;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .game-item:hover { border-color: #444; transform: scale(1.03); }
        .game-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .game-item .info { padding: 10px; }
        .game-item .name { font-size: 0.8rem; font-weight: bold; color: #ccc; display: block; }
        .game-item .code { font-size: 0.7rem; color: #666; }

        /* Fullscreen Player */
        #game-player {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="calc-container">
        <div class="mode-header">
            <span>Code Mode</span>
            <label class="switch">
                <input type="checkbox" id="codeMode">
                <span class="slider"></span>
            </label>
        </div>

        <div class="display-screen" id="display">0</div>

        <div class="keypad">
            <div class="sci-row">
                <button class="btn btn-sci" onclick="sci('sin')">sin</button>
                <button class="btn btn-sci" onclick="sci('cos')">cos</button>
                <button class="btn btn-sci" onclick="sci('tan')">tan</button>
                <button class="btn btn-sci" onclick="sci('log')">log</button>
                <button class="btn btn-sci" onclick="sci('ln')">ln</button>
                <button class="btn btn-sci" onclick="press('**')">x^y</button>
            </div>
            <button class="btn btn-wide" onclick="sci('pi')">π</button>
            <button class="btn btn-wide" onclick="sci('e')">e</button>

            <button class="btn btn-red" onclick="reset()">C</button>
            <button class="btn btn-orange" onclick="sci('sqrt')">√</button>
            <button class="btn btn-orange" onclick="press('/')">÷</button>
            <button class="btn btn-orange" onclick="press('*')">×</button>

            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <button class="btn btn-orange" onclick="press('-')">−</button>

            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn btn-orange" onclick="press('+')">+</button>

            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            <button class="btn btn-orange" style="grid-row: span 2;" onclick="calculate()">=</button>

            <button class="btn btn-wide" onclick="press('0')">0</button>
            <button class="btn" onclick="press('.')">.</button>
        </div>
    </div>

    <div id="arcade-container">
        <div class="arcade-nav">
            <input type="text" class="search-bar" id="search" placeholder="Search..." oninput="filterGames()">
            <button class="exit-btn" onclick="closeArcade()">Exit</button>
        </div>
        <div class="game-grid" id="game-grid"></div>
    </div>

    <div id="game-player">
        <button class="exit-btn" style="position: absolute; top: 10px; right: 10px;" onclick="closePlayer()">Close</button>
        <iframe id="iframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <script>
        const GAMES_DATA = [
            {"code": "1001", "name": "10 Minutes Till Dawn", "iframe": "https://geet.in.net/get/10-minutes-till-dawn/game.html", "thumb": "https://geet.in.net/get/10-minutes-till-dawn/splash.png"},
            {"code": "1002", "name": "1v1.LOL", "iframe": "https://geet.in.net/get/1v1-lol/game.html", "thumb": "https://geet.in.net/get/1v1-lol/splash.png"},
            {"code": "1003", "name": "1 on 1 Soccer", "iframe": "https://geet.in.net/get/1v1-soccer/game.html", "thumb": "https://geet.in.net/get/1v1-soccer/logo.jpg"},
            {"code": "1004", "name": "2048", "iframe": "https://geet.in.net/get/2048/game.html", "thumb": "https://geet.in.net/get/2048/thumb.png"},
            {"code": "1005", "name": "3D Bowling", "iframe": "https://geet.in.net/get/3d-bowling/game.html", "thumb": "https://geet.in.net/get/3d-bowling/logo.jpg"},
            {"code": "1006", "name": "8 Ball", "iframe": "https://geet.in.net/get/8-ball/game.html", "thumb": "https://geet.in.net/get/8-ball/tmp/8BallBilliardsClassicTeaser.jpg"},
            {"code": "1009", "name": "Ages of Conflict", "iframe": "https://geet.in.net/get/ages-of-conflict/game.html", "thumb": "https://geet.in.net/get/ages-of-conflict/splash.jpg"},
            {"code": "1010", "name": "Among Us", "iframe": "https://geet.in.net/get/among-us/game.html", "thumb": "https://geet.in.net/get/among-us/red.png"},
            {"code": "1016", "name": "Backrooms", "iframe": "https://geet.in.net/get/backrooms/game.html", "thumb": "https://geet.in.net/get/backrooms/img/splash.jpg"},
            {"code": "2007", "name": "Subway Surfers", "iframe": "https://geet.in.net/get/subway-surfers/game.html", "thumb": "https://geet.in.net/get/subway-surfers-ny/NewYorkIcon.png"}
            // Add remaining data here
        ];

        let exp = "";
        const disp = document.getElementById('display');

        function press(val) {
            if(exp === "0") exp = "";
            exp += val;
            disp.innerText = exp;
        }

        function reset() { exp = "0"; disp.innerText = exp; }

        function calculate() {
            if(document.getElementById('codeMode').checked && exp === "8290") {
                openArcade();
                reset();
                return;
            }
            try {
                exp = eval(exp).toString();
                disp.innerText = exp;
            } catch {
                disp.innerText = "Error";
                exp = "";
            }
        }

        function sci(type) {
            let v = parseFloat(exp) || 0;
            if(type === 'sin') exp = Math.sin(v * Math.PI / 180).toFixed(4);
            if(type === 'cos') exp = Math.cos(v * Math.PI / 180).toFixed(4);
            if(type === 'sqrt') exp = Math.sqrt(v).toFixed(4);
            if(type === 'pi') exp = Math.PI.toFixed(4);
            disp.innerText = exp;
        }

        function openArcade() {
            document.getElementById('arcade-container').style.display = 'block';
            filterGames();
        }

        function closeArcade() { document.getElementById('arcade-container').style.display = 'none'; }

        function filterGames() {
            const term = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            
            GAMES_DATA.filter(g => g.name.toLowerCase().includes(term)).forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-item';
                div.innerHTML = `<img src="${g.thumb}"><div class="info"><span class="name">${g.name}</span><span class="code">${g.code}</span></div>`;
                div.onclick = () => {
                    document.getElementById('iframe').src = g.iframe;
                    document.getElementById('game-player').style.display = 'block';
                };
                grid.appendChild(div);
            });
        }

        function closePlayer() {
            document.getElementById('game-player').style.display = 'none';
            document.getElementById('iframe').src = "";
        }
    </script>
</body>
</html>
