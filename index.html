<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0nlineCalculator</title>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/s2/favicons?domain=calculator.com">
    <style>
        :root {
            --bg-color: #2c343f;
            --calc-bg: #343d4a;
            --display-bg: #cbd5c0;
            --btn-gray: #434c5e;
            --btn-orange: #e67e22;
            --btn-red: #e74c3c;
            --accent-green: #2ecc71;
            --text-light: #ffffff;
            --arcade-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #d1d9e6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Nav Bar --- */
        .top-nav {
            width: 100%;
            background: #1e293b;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .top-nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .top-nav a:hover { color: var(--accent-green); }

        /* --- Calculator --- */
        #calc-view {
            margin-top: 60px;
            background-color: var(--calc-bg);
            padding: 25px;
            border-radius: 20px;
            width: 360px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        .display-screen {
            background-color: var(--display-bg);
            height: 80px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 15px;
            color: #1e293b;
            font-size: 2.8rem;
            font-family: 'Courier New', monospace;
            border: 4px solid #1e293b;
        }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 18px 0;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            background-color: var(--btn-gray);
            transition: all 0.1s;
            box-shadow: 0 4px 0 #1e293b;
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-orange { background-color: var(--btn-orange); box-shadow: 0 4px 0 #874a16; }
        .btn-red { background-color: var(--btn-red); box-shadow: 0 4px 0 #7b2a1f; }
        .btn-wide { grid-column: span 2; }

        /* --- Arcade --- */
        #arcade-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--arcade-bg);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        .arcade-controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .search-input {
            flex-grow: 1;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #334155;
            text-align: center;
        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--accent-green); }
        .game-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .game-card p { color: #f1f5f9; font-size: 0.8rem; font-weight: 600; padding: 10px; margin: 0; }

        /* Fullscreen Player */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200;
        }
        #game-frame { width: 100%; height: calc(100% - 60px); border: none; }
        .player-nav { height: 60px; background: #1e293b; display: flex; align-items: center; padding: 0 20px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#">Algebra</a>
        <a href="#">Geometry</a>
        <a href="#">Graphing</a>
        <a href="#">Unit Conv</a>
        <a href="#">Settings</a>
    </nav>

    <div id="calc-view">
        <div class="mode-header">
            <span>Code Mode</span>
            <label class="switch">
                <input type="checkbox" id="codeMode">
                <span class="slider"></span>
            </label>
        </div>
        <div class="display-screen" id="display">0</div>
        <div class="keypad">
            <button class="btn btn-red" onclick="reset()">C</button>
            <button class="btn btn-orange" onclick="press('/')">÷</button>
            <button class="btn btn-orange" onclick="press('*')">×</button>
            <button class="btn btn-orange" onclick="press('-')">−</button>
            
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <button class="btn btn-orange" onclick="press('+')">+</button>
            
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn btn-orange" style="grid-row: span 2;" onclick="calculate()">=</button>
            
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            
            <button class="btn btn-wide" onclick="press('0')">0</button>
            <button class="btn" onclick="press('.')">.</button>
        </div>
    </div>

    <div id="arcade-view">
        <div class="arcade-controls">
            <input type="text" class="search-input" id="search" placeholder="Search for games..." oninput="renderGames()">
            <button class="btn btn-red" onclick="closeArcade()" style="padding: 10px 20px; box-shadow: none;">Exit</button>
        </div>
        <div class="game-grid" id="game-grid"></div>
    </div>

    <div id="player-overlay">
        <div class="player-nav">
            <button class="btn btn-red" onclick="closePlayer()" style="padding: 5px 15px; box-shadow: none;">Back to Arcade</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // MASSIVE GAME DATA
        const GAMES_DATA = [
            {"name": "1v1.LOL", "iframe": "https://geet.in.net/get/1v1-lol/game.html", "thumb": "https://geet.in.net/get/1v1-lol/splash.png"},
            {"name": "Subway Surfers", "iframe": "https://geet.in.net/get/subway-surfers/game.html", "thumb": "https://geet.in.net/get/subway-surfers-ny/NewYorkIcon.png"},
            {"name": "Among Us", "iframe": "https://geet.in.net/get/among-us/game.html", "thumb": "https://geet.in.net/get/among-us/red.png"},
            {"name": "Drive Mad", "iframe": "https://geet.in.net/get/drive-mad/game.html", "thumb": "https://geet.in.net/get/drive-mad/logo.jpg"},
            {"name": "Retro Bowl", "iframe": "https://geet.in.net/get/retro-bowl/game.html", "thumb": "https://geet.in.net/get/retro-bowl/img/icon.jpg"},
            {"name": "Slope", "iframe": "https://geet.in.net/get/slope/game.html", "thumb": "https://geet.in.net/get/slope/slope4.jpeg"},
            {"name": "2048", "iframe": "https://geet.in.net/get/2048/game.html", "thumb": "https://geet.in.net/get/2048/thumb.png"},
            {"name": "Minecraft 1.5", "iframe": "https://geet.in.net/get/minecraft-15/game.html", "thumb": "https://geet.in.net/get/minecraft-15/splash.jpeg"},
            {"name": "Five Nights at Freddy's", "iframe": "https://geet.in.net/get/fnaf/game.html", "thumb": "https://geet.in.net/get/fnaf/logo.jpg"},
            {"name": "Geometry Dash", "iframe": "https://geet.in.net/get/geometry-dash/game.html", "thumb": "https://geet.in.net/get/geometry-dash/geoscratchicon.png"},
            {"name": "Moto X3M", "iframe": "https://geet.in.net/get/motox3m/game.html", "thumb": "https://geet.in.net/get/motox3m/splash.jpg"},
            {"name": "Tunnel Rush", "iframe": "https://geet.in.net/get/tunnel-rush/game.html", "thumb": "https://geet.in.net/get/tunnel-rush/img/tunnel.jpg"},
            {"name": "Cookie Clicker", "iframe": "https://geet.in.net/get/cookie-clicker/game.html", "thumb": "https://geet.in.net/get/cookie-clicker/thumb.png"},
            {"name": "BitLife", "iframe": "https://geet.in.net/get/bl/game.html", "thumb": "https://geet.in.net/get/bl/splash.png"},
            {"name": "Eaglercraft (MC)", "iframe": "https://geet.in.net/get/eagle-craft/embed.html", "thumb": "https://geet.in.net/get/eagle-craft/logo.jpg"}
            // You can continue adding your other 100+ items here
        ];

        let currentExp = "";
        const display = document.getElementById('display');

        function press(num) {
            currentExp += num;
            display.innerText = currentExp;
        }

        function reset() {
            currentExp = "";
            display.innerText = "0";
        }

        function calculate() {
            const isCodeMode = document.getElementById('codeMode').checked;
            
            // SECRET CODE CHECK
            if (isCodeMode && currentExp === "8290") {
                document.getElementById('arcade-view').style.display = 'block';
                reset();
                renderGames();
                return;
            }

            try {
                currentExp = eval(currentExp).toString();
                display.innerText = currentExp;
            } catch {
                display.innerText = "Error";
                currentExp = "";
            }
        }

        function renderGames() {
            const term = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            
            GAMES_DATA.filter(g => g.name.toLowerCase().includes(term)).forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.innerHTML = `<img src="${g.thumb}"><p>${g.name}</p>`;
                div.onclick = () => {
                    document.getElementById('game-frame').src = g.iframe;
                    document.getElementById('player-overlay').style.display = 'block';
                };
                grid.appendChild(div);
            });
        }

        function closeArcade() { document.getElementById('arcade-view').style.display = 'none'; }
        function closePlayer() { 
            document.getElementById('player-overlay').style.display = 'none'; 
            document.getElementById('game-frame').src = "";
        }
    </script>
</body>
</html>
