<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcSolver Clone</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --calc-bg: #1e293b;
            --display-bg: #000000;
            --btn-gray: #334155;
            --btn-accent: #3b82f6;
            --btn-op: #f59e0b;
            --text-light: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .calculator {
            background: var(--calc-bg);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .display {
            background: var(--display-bg);
            padding: 20px;
            text-align: right;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        #current-operand { font-size: 2.5rem; font-weight: bold; overflow-x: auto; white-space: nowrap; }
        #previous-operand { font-size: 1rem; color: #94a3b8; height: 1.5rem; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn {
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 10px;
            background: var(--btn-gray);
            color: white;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .sci { background: #1e293b; border: 1px solid #475569; font-size: 0.9rem; }
        .operator { background: var(--btn-op); font-weight: bold; }
        .equal { background: var(--btn-accent); grid-column: span 1; }
        .clear { background: #ef4444; }
        .wide { grid-column: span 2; }
        .mode-area { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="mode-area">
        <span>Calc</span>
        <input type="checkbox" id="modeToggle">
        <span>Code Mode</span>
    </div>

    <div class="calculator">
        <div class="display">
            <div id="previous-operand"></div>
            <div id="current-operand">0</div>
        </div>
        
        <div class="keypad">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn sci" onclick="appendFunction('sqrt')">√</button>
            <button class="btn sci" onclick="appendOperator('**')">^</button>
            <button class="btn operator" onclick="appendOperator('/')">÷</button>

            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('*')">×</button>

            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('-')">−</button>

            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>

            <button class="btn wide" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
            <button class="btn equal" onclick="compute()">=</button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        const currentDisplay = document.getElementById('current-operand');
        const previousDisplay = document.getElementById('previous-operand');

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
            previousDisplay.innerText = previousInput;
        }

        function appendNumber(num) {
            if (currentInput === '0' && num !== '.') currentInput = num;
            else currentInput += num;
            updateDisplay();
        }

        function appendOperator(op) {
            currentInput += op;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            updateDisplay();
        }

        function compute() {
            try {
                if (document.getElementById('modeToggle').checked && currentInput === '0000') {
                    alert("System Override: Code Accepted.");
                    currentInput = "HELLO WORLD";
                } else {
                    previousInput = currentInput;
                    currentInput = eval(currentInput.replace('×', '*').replace('÷', '/')).toString();
                }
            } catch (e) {
                currentInput = "Error";
            }
            updateDisplay();
        }

        function appendFunction(fn) {
            if (fn === 'sqrt') currentInput = Math.sqrt(eval(currentInput)).toString();
            updateDisplay();
        }
    </script>
</body>
</html>
